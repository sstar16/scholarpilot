[mypy]
python_version = 3.11
mypy_path = .
explicit_package_bases = True
namespace_packages = True
# Narrow scope: only the type-discipline modules we've actively hardened.
# Expand `files` (and lift `follow_imports`) as more modules are made type-safe.
files =
    app/services/fetchers/types.py,
    app/services/fetchers/base.py,
    app/services/staleness.py,
    app/services/project_recipe.py,
    app/services/telemetry.py,
    app/api/telemetry.py,
    app/workers/recipe_tasks.py,
    app/harness/pipeline,
    tests/parity/recorder.py,
    tests/parity/record_round.py
strict_equality = True
warn_unused_ignores = False
warn_redundant_casts = True
# Out-of-scope imports are not yet hardened; following them would surface
# 100+ pre-existing issues unrelated to this PR. Re-enable as scope grows.
follow_imports = silent

# Third-party packages without stubs
[mypy-celery.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-app.services.event_bus]
ignore_missing_imports = True

[mypy-app.harness.hook_engine]
ignore_missing_imports = True

[mypy-app.services.partial_synthesizer]
ignore_missing_imports = True

[mypy-app.services.answer_now_helpers]
ignore_missing_imports = True

# httpx optional transport deps (h2/lz4) -- ignore if not in requirements
[mypy-h2.*]
ignore_missing_imports = True

[mypy-lz4.*]
ignore_missing_imports = True
