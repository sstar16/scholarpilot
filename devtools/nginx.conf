server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker 内置 DNS（127.0.0.11），10s TTL —— 让 backend 容器重建后
    # 这里能在 10s 内跟进新 IP，不再需要手动 restart devtools。
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 通过变量引用 upstream 触发每次请求重新解析 DNS。
        # 直接 `proxy_pass http://backend:8000` 只在 nginx 启动时解析一次，
        # backend 容器重建（IP 变化）后会出现 502 connection refused。
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
