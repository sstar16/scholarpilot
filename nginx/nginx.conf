events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cloudflare / Let's Encrypt 反代感知：
    # - 反代（Cloudflare、未来直连 HTTPS 的 nginx）会在请求里塞 X-Forwarded-Proto: https
    # - 没有反代的本地请求保持原始 $scheme
    # 透传给 backend 后，uvicorn 的 --proxy-headers 会把 request.url.scheme 重写成 https
    map $http_x_forwarded_proto $real_scheme {
        default $scheme;
        https   https;
    }

    # 2026-04-25：删除原 `upstream backend { server backend:8000; }` 块，
    # 改成动态 resolver + 变量化 proxy_pass。
    #
    # 旧 upstream 写法和静态 `proxy_pass http://backend` 都会让 nginx 在启动时
    # 一次性解析 DNS 然后写死 IP，不再刷新。Docker 给容器重建时分配新 IP，
    # backend 重启后 nginx 仍指向旧 IP → 502 connection refused（CLAUDE.md 已多次踩坑）。
    #
    # 新做法：
    #   1. resolver 127.0.0.11 = Docker 内置 embedded DNS server（每个用户网络都有），
    #      valid=10s 缓存 10 秒，跟随容器 IP 变化
    #   2. proxy_pass 用变量 $upstream，nginx 对变量 upstream 每次请求都重新解析 DNS
    #   3. 必须配 $request_uri 才能保留原始 URI（变量模式下 nginx 不自动转发 URI）

    server {
        listen 80;
        # 443 用 Cloudflare Origin Certificate（Cloudflare 免费签，15 年有效）。
        # Cloudflare SSL/TLS 模式必须是 Full (Strict)：
        #   - 用户↔Cloudflare HTTPS（Universal SSL）
        #   - Cloudflare↔源站 HTTPS（此处，校验 Origin CA 证书）
        # 目的：让 Cloudflare 到源站的 TCP 也是加密的，阿里云在骨干网抓不到明文
        # Host header，就不会对未备案的 scholarpilot.top 返回 beian-block 403。
        listen 443 ssl;
        http2 on;
        server_name _;
        client_max_body_size 50M;

        ssl_certificate     /etc/nginx/certs/origin.crt;
        ssl_certificate_key /etc/nginx/certs/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # 基础安全头（HSTS 等 HTTPS 稳定后再开；现在开会把用户锁在 http 里）
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 动态 DNS：Docker 内置 resolver，10s TTL 让 backend/frontend 容器
        # 重建后这里能在 10s 内自动跟进新 IP，不再需要手动 restart nginx。
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream "backend:8000";
        set $frontend_upstream "frontend:80";

        # SSE 流式推送 — 必须禁用 nginx 缓冲
        location /api/stream/ {
            proxy_pass http://$backend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
        }

        # API 代理到 backend（含 WebSocket 升级头，支持 /api/projects/ws/... 路径）
        location /api/ {
            proxy_pass http://$backend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_read_timeout 3600s;
        }

        # 保留 /ws/ 前缀兼容性（备用）
        location /ws/ {
            proxy_pass http://$backend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_read_timeout 3600s;
        }

        location /docs {
            proxy_pass http://$backend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $real_scheme;
        }

        location /openapi.json {
            proxy_pass http://$backend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $real_scheme;
        }

        # 前端静态资源
        location / {
            proxy_pass http://$frontend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $real_scheme;
        }
    }
}
